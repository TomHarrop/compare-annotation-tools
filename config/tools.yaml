tools:
  braker3:
    container: "docker://teambraker/braker3:v3.0.7.1"
    result_files:
      - "braker.gff3"
      - "braker.gtf"
    orthodb_divisions:
      Arthropoda: "https://bioinf.uni-greifswald.de/bioinf/partitioned_odb12/Arthropoda.fa.gz"
      Eukaryota: "https://bioinf.uni-greifswald.de/bioinf/partitioned_odb12/Eukaryota.fa.gz"
      Fungi: "https://bioinf.uni-greifswald.de/bioinf/partitioned_odb12/Fungi.fa.gz"
      Metazoa: "https://bioinf.uni-greifswald.de/bioinf/partitioned_odb12/Metazoa.fa.gz"
      Vertebrata: "https://bioinf.uni-greifswald.de/bioinf/partitioned_odb12/Vertebrata.fa.gz"
      Viridiplantae: "https://bioinf.uni-greifswald.de/bioinf/partitioned_odb12/Viridiplantae.fa.gz"
  helixer:
    container: "docker://ghcr.io/tomharrop/container-helixer:helixer_v0.3.6_cuda_12.2.2-cudnn8_cv2"
    result_files:
      - "helixer.gff3"
    lineages:
      - "fungi"
      - "invertebrate"
      - "land_plant"
      - "vertebrate"
  tiberius:
    container: "docker://larsgabriel23/tiberius:1.1.8"
    result_files:
      - "tiberius.gtf"
    models:
      Eudicotyledons: "https://bioinf.uni-greifswald.de/bioinf/tiberius/models/eudicotyledons_weights.tar.gz"
      Insecta: "https://bioinf.uni-greifswald.de/bioinf/tiberius/models/insecta_unmasked_v2.tar.gz"
      Monocotyledonae: "https://bioinf.uni-greifswald.de/bioinf/tiberius/models/monocotyledonae_weights.tar.gz"
      Fungi: "https://bioinf.uni-greifswald.de/bioinf/tiberius/models/fungi.tar.gz" # rhynco
      Vertebrates: "https://bioinf.uni-greifswald.de/bioinf/tiberius/models/vertebrates_weights.tar.gz"
    requires_softmasking:
      - Eudicotyledons
      - Monocotyledonae
  funannotate:
    container: "docker://ghcr.io/tomharrop/container-funannotate:1.8.17_cv6"
    result_files:
      - "funannotate.gff3"
    dbs:
      - "repeats"
      - "uniprot"
utils:
  bbmap: "docker://quay.io/biocontainers/bbmap:39.01--h92535d8_1"
  debian: "docker://debian:stable-20250113"
  r: "docker://ghcr.io/tomharrop/r-containers:r2u_24.04_cv1"
  samtools: "docker://quay.io/biocontainers/samtools:1.23--h96c455f_0"
  tetools: "docker://dfam/tetools:1.95"
  wget: "docker://quay.io/biocontainers/gnu-wget:1.18--hb829ee6_10"
qc:
  annooddities:
    container: "docker://gemygk/annooddities:v0.2.0"
    result_files:
      - "AnnoOddities.tar.gz"
      - "AnnoOddities.gff"
      - "AnnoOddities.combined_statistics.json"
      - "AnnoOddities.oddity_summary.txt"
  atol_qc_annotation:
    container: "docker://quay.io/biocontainers/atol-qc-annotation:0.1.4--pyhdfd78af_1"
    result_files:
      - "omark_summary.json"
      - "proteins.faa"
      - "short_summary.specific.busco.json"
      - "short_summary.specific.busco.txt"
